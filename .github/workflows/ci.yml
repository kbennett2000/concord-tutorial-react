name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  three-engine-smoke:
    runs-on: ubuntu-latest

    services:
      concord:
        # Pinned to v1.1.0 — this course targets v1.1.0 (Lesson 2 needs multi-translation
        # keyword search). The published image carries its own HEALTHCHECK.
        image: ghcr.io/kbennett2000/concord:v1.1.0
        ports:
          - 8000:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/screenshots/package-lock.json

      - name: Wait for Concord (v1.1.0) on :8000
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/healthz >/dev/null 2>&1; then
              echo "Concord is up:"; curl -fsS http://localhost:8000/healthz; echo; exit 0
            fi
            echo "waiting for Concord… ($i)"; sleep 2
          done
          echo "Concord did not become ready on :8000" >&2; exit 1

      - name: Install screenshot-tool deps
        working-directory: tools/screenshots
        run: npm ci

      - name: Contract check (/v1 shapes vs v1.1.0)
        working-directory: tools/screenshots
        run: npm run contract
